name: Bharat Jankari Live Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/bharatjankari.com/public_html
            
            # Latest code pull karein
            git pull origin main

            # Dependencies aur Build
            npm install
            npm run build

            # Sabse zaroori: Port 3002 ke saath restart/start karein
            # Hum pehle purana delete karenge taaki port conflict na ho
            pm2 delete bharat-jankari || true
            PORT=3002 pm2 start npm --name "bharat-jankari" -- start -- -p 3002
            
            # PM2 list save karein
            pm2 save