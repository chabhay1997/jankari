name: Bharat Jankari Live Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/bharatjankari.com/public_html
            
            # Kill existing PM2 processes first
            pm2 delete bharat-jankari || true
            sleep 2
            
            # Latest code pull karein
            git pull origin main
            
            # Dependencies aur Build
            npm install
            npm run build
            
            # Start with correct working directory - THIS IS THE KEY FIX
            pm2 start npm --name "bharat-jankari" \
              --cwd "/home/bharatjankari.com/public_html" \
              -- start -- -p 3002
            
            # PM2 save karein
            pm2 save
            pm2 list