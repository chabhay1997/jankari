name: Bharat Jankari Live Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            cd /home/bharatjankari.com/public_html

            # Git safe directory issue ko avoid karein
            git config --global --add safe.directory /home/bharatjankari.com/public_html

            # Server par existing local/untracked files ko preserve karke clean sync karein
            git stash push --include-untracked -m "ci-pre-deploy-$(date +%Y%m%d-%H%M%S)" || true
            git fetch origin main
            git reset --hard origin/main

            # Production env ensure karein
            cat > .env.production <<EOF
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            API_AUTH_TOKEN=${{ secrets.API_AUTH_TOKEN }}
            EOF

            # Dependencies aur Build
            npm ci
            chmod +x node_modules/next/dist/bin/next node_modules/.bin/next || true
            npm run build

            # Build ke baad hi PM2 restart/start karein
            if pm2 describe bharat-jankari > /dev/null; then
              pm2 restart bharat-jankari --update-env
            else
              pm2 start npm --name "bharat-jankari" \
                --cwd "/home/bharatjankari.com/public_html" \
                -- start -- -p 3002
            fi

            # PM2 save karein
            pm2 save
            pm2 list
